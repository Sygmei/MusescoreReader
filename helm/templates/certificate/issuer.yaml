apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "fumen.issuerName" . }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@{{ include "fumen.baseDomain" . }}
    privateKeySecretRef:
      name: {{ include "fumen.issuerAccountSecretName" . }}
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-secret
              key: token
