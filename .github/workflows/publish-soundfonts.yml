name: Publish Soundfonts Image

on:
  push:
    branches:
      - main
    paths:
      - soundfonts/VERSION
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-soundfonts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read soundfonts version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < soundfonts/VERSION)"
          if [[ -z "$version" ]]; then
            echo "soundfonts/VERSION is empty" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push soundfonts image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.soundfonts
          push: true
          tags: ghcr.io/sygmei/fumen-soundfonts:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
